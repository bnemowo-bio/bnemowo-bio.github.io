<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>owo 🦈</title>
    <link rel="icon" type="image/png" href="assets/shark.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="darkreader-lock">
    <meta name="color-scheme" content="dark only">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
    <!-- YOUR MOM || WTF RU LOOKING FOR -->
<body>
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="assets/bg.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <main class="container">
        <img src="assets/avatar.jpg" class="avatar">

        <h1>Nem</h1>
        <p class="bio">Intern Coder • Student</p>

        <div class="links">

            <div class="discord-wrapper icon-btn-wrapper">
                <a href="#" target="_blank" class="discord-btn" id="discord-link">
                    <i class="fa-brands fa-discord"></i>
                </a>
                <span class="icon-tooltip">Discord</span>
                
                <div class="discord-card" id="discord-card">
                    <div class="dc-top">

                        <div class="avatar-box">
                            <img id="dc-avatar" />
                            <div id="dc-decoration" class="avatar-ring"></div>
                            <span class="status-dot" id="status-dot"></span>
                        </div>

                        <div class="dc-info" id="dc-info">
                            <div id="dc-name" class="dc-name"></div>
                            <div id="dc-username" class="dc-username"></div>
                        </div>
                    </div>

                    
                    <div class="dc-bottom">

                        <div class="spotify-box" id="spotify-section">
                            <div class="album-art" id="album-art"></div>
                             <div class="spotify-info">
                                <div class="marquee-wrap"><div id="spotify-song" class="marquee-text"></div></div>
                                <div class="marquee-wrap"><div id="spotify-artist" class="marquee-text"></div></div>
                                <div class="spotify-progress">
                                    <div id="spotify-bar"></div>
                                </div>
                             </div>
                        </div>

                        <div class="activity-box" id="dc-activity">
                            <div class="activity-name" id="activity-name"></div>
                            <div class="activity-details" id="activity-details"></div>
                            <div class="activity-time" id="activity-time"></div>
                        </div>
                    </div>
                        


                </div>
            </div>


            <a href="https://www.instagram.com/bnemowo/" target="_blank" class="icon-btn-wrapper">
                <span class="icon-btn">
                    <i class="fa-brands fa-instagram"></i>
                </span>
                <span class="icon-tooltip">Instagram</span>
            </a>
            
        </div>

        <p class="views">
            <span class="icon-btn-wrapper">
                <span class="views-btn">
                    <i class="fa-solid fa-eye"></i>
                    <span id="views">--?</span>
                </span>
                <span class="icon-tooltip">Views</span>
            </span>
        </p>
    </main>

    <script src="script.js"></script>
</body>
</html>
